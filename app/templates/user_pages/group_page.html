{% extends "base/user_base.html" %}

{% block title %}
    Groupfinder - TEMP: Group name
{% endblock title %}

{% block main %}
<main class="columns m-2">
    <div class="column py-4 is-two-thirds">
        <div class="block mb-4">
            <h1 class="title is-1 mb-2">1531 group</h1>
            <div class="tags">
                <span class="tag is-link is-light is-medium">Academic</span>
                <span class="tag is-info is-light is-medium">COMP</span>
            </div>
        </div>

        <div class="block my-5">
            <div class="icon-text my-3">
                <span class="icon has-text-grey is-medium">
                    <i class="fa fa-file-text-o fa-lg"></i> 
                </span>
                <span class="is-size-4">Aiming for a Distinction!</span>
            </div>
            
            <div class="icon-text my-3">
                <span class="icon has-text-grey is-medium">
                    <i class="fa fa-map-marker fa-lg"></i> 
                </span>
                <span class="is-size-4">Online</span>
            </div>
        </div>

        <div class="pt-4">
            <a href="#" class="button is-link is-large is-rounded px-6">
                <strong>Join Group</strong>
            </a>
        </div>
    </div>

    <div class="column">
        <div class="box p-5">
            <h2 class="title is-4 mb-5 pb-2"">
                Members <span class="has-text-grey-light is-size-5">(4/5)</span>
            </h2>

            <div>
                <div class="is-flex is-align-items-center">
                    <span class="icon is-large has-text-info">
                        <i class="fa fa-circle fa-2x"></i> 
                    </span>
                    <span class="is-size-5 ml-3 has-text-weight-bold">Person 1</span>
                    <span class="tag is-light ml-2">Owner</span>
                </div>

                <div class="is-flex is-align-items-center">
                    <span class="icon is-large has-text-warning">
                        <i class="fa fa-circle fa-2x"></i> 
                    </span>
                    <span class="is-size-5 ml-3">Person 2</span>
                </div>

                <div class="is-flex is-align-items-center">
                    <span class="icon is-large has-text-success">
                        <i class="fa fa-circle fa-2x"></i> 
                    </span>
                    <span class="is-size-5 ml-3">Person 3</span>
                </div>

                <div class="is-flex is-align-items-center">
                    <span class="icon is-large has-text-danger">
                        <i class="fa fa-circle fa-2x"></i> 
                    </span>
                    <span class="is-size-5 ml-3">Person 4</span>
                </div>
            </div>
        </div>
    </div>
    
</main>
{% endblock main %}
