<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
    {% block title %}
    Document
    {% endblock title %}
    </title>

    {# Favicon #}
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    
    {# Stylesheet #}
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>


<body>
    {% block nav %}
    {# Common header #}
    <nav class="navbar theme-adaptive-navbar" role="navigation" aria-label="main navigation">
        <div id="public_navbar_groupfinder" class="navbar-menu">
            <div class="navbar-start">
                <a class="navbar-item" href="{{ url_for('home') }}">
                    Home
                </a>

            </div>
            <div class="navbar-end">
                <div class="navbar-item">
                    <div class="buttons">
                        <button id="theme-toggle" class="navbar-item button is-text theme-toggle">
                            <span class="icon">
                                <i id="theme-toggle-icon" class="fa fa-moon-o"></i>
                            </span>
                        </button>
                        <a href="{{ url_for('show_login_form')  }}" class="button is-light">
                            Log in
                        </a>
                        <a href="{{ url_for('show_signup_form')  }}" class="button is-link">
                            <strong>Sign up</strong>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    {% endblock nav %}

    {% block main %}

    {% endblock main %}


    {% block footer %}
    <!-- Common footer -->
    <footer>
    <nav class="navbar theme-adaptive-navbar mt-6" role="navigation" aria-label="main navigation">
        <div id="public_navbar_groupfinder" class="navbar-menu">
            <div class="navbar-end">
                <div class="navbar-item">
                    <p class="navigation right_nav">Made with <span class="icon"><i class="fa fa-heart has-text-link"></i></span> by GroupFinder</p>
                </div>
        </div>
    </nav>
    </footer>
    {% endblock footer %}

</body>
</html>
